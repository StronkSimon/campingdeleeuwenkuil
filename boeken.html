<script>
// === EmailJS setup (fill in your keys below) ===
const EMAILJS_PUBLIC_KEY = "vYIcVLonuRQe6aJkw";
const EMAILJS_SERVICE_ID = "service_uzvwpxw";
const TEMPLATE_ID_OWNER = "template_owner";   // to: info@campingdeleeuwenkuil.nl
const TEMPLATE_ID_GUEST = "template_guest";   // to: customer's email

// Initialize EmailJS
if (emailjs && EMAILJS_PUBLIC_KEY !== "YOUR_PUBLIC_KEY") {
  emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });
}

function calcNights(start, end) { 
  const s = new Date(start), e = new Date(end);
  if (!start || !end || isNaN(s) || isNaN(e)) return 1;
  const ms = e - s; 
  const nights = Math.max(1, Math.ceil(ms / (1000*60*60*24)));
  return nights;
}
function updateSummary() { 
  const checked = document.querySelector('input[name="accom"]:checked');
  const price = Number(checked.dataset.price);
  const start = document.getElementById('start').value;
  const end = document.getElementById('end').value;
  const nights = calcNights(start, end);
  document.getElementById('summary').textContent = nights + ' nacht' + (nights>1?'en':'') + ' · €' + (price*nights) + ' totaal';
}
document.querySelectorAll('input[name="accom"], #start, #end').forEach(el => el.addEventListener('change', updateSummary));
updateSummary();

const form = document.getElementById('bookingForm');
const successBox = document.getElementById('success');
const errorBox = document.getElementById('errorBox');

form.addEventListener('submit', async function(e){
  e.preventDefault();
  errorBox.style.display = 'none';

  const accom = document.querySelector('input[name="accom"]:checked').value;
  const price = Number(document.querySelector('input[name="accom"]:checked').dataset.price);
  const first = document.getElementById('firstName').value.trim();
  const last = document.getElementById('lastName').value.trim();
  const email = document.getElementById('email').value.trim();
  const start = document.getElementById('start').value;
  const end = document.getElementById('end').value;
  const notes = document.getElementById('notes').value.trim();
  if (!first || !last || !email || !start || !end) { alert('Vul alle verplichte velden in.'); return; }
  const nights = calcNights(start, end);
  const total = price * nights;

  // Disable button + show loading
  const submitBtn = form.querySelector('button[type="submit"]');
  const originalText = submitBtn.textContent;
  submitBtn.disabled = true;
  submitBtn.textContent = 'Versturen...';

  const baseParams = {
    first, last, email, accom, start, end, nights, total, notes: notes || '—'
  };

  try {
    // Send to owner
    await emailjs.send(EMAILJS_SERVICE_ID, TEMPLATE_ID_OWNER, {
      ...baseParams,
      to_email: "info@campingdeleeuwenkuil.nl",
      subject: `Nieuwe reservering – ${first} ${last}`
    });

    // Send confirmation to guest
    await emailjs.send(EMAILJS_SERVICE_ID, TEMPLATE_ID_GUEST, {
      ...baseParams,
      to_email: email,
      subject: `Bevestiging reservering – Camping de Leeuwenkuil`
    });

    // Success UI
    form.style.display = 'none';
    successBox.style.display = 'block';
    window.scrollTo({top:0, behavior:'smooth'});
  } catch (err) {
    console.error(err);
    errorBox.style.display = 'block';
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = originalText;
  }
});
</script>
